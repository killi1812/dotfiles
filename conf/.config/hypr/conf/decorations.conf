decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = on
        ignore_opacity = true
        xray = true
        # blurls = waybar
    }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = 0x66000000
    }
}

# power options 

# reduse fps
misc:vfr = true

# disables blure on nonfucused windows
# decoration:blur:enabled = false

# disables shadows
decoration:shadow:enabled = false
